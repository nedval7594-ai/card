<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>크리스탈 킴 - 웹 명함</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="card" id="card">
            <div class="card-inner">
                <!-- 앞면 -->
                <div class="card-front">
                    <div class="character">
                        <svg viewBox="0 0 200 280" xmlns="http://www.w3.org/2000/svg">
                            <!-- 머리 -->
                            <circle cx="100" cy="80" r="50" fill="#f4a460"/>
                            
                            <!-- 귀 -->
                            <ellipse cx="50" cy="80" rx="15" ry="25" fill="#f4a460"/>
                            <ellipse cx="150" cy="80" rx="15" ry="25" fill="#f4a460"/>
                            
                            <!-- 눈 -->
                            <circle cx="85" cy="70" r="6" fill="#333"/>
                            <circle cx="115" cy="70" r="6" fill="#333"/>
                            <circle cx="87" cy="68" r="2" fill="#fff"/>
                            <circle cx="117" cy="68" r="2" fill="#fff"/>
                            
                            <!-- 입 -->
                            <path d="M 85 90 Q 100 100 115 90" stroke="#333" stroke-width="2" fill="none" stroke-linecap="round"/>
                            
                            <!-- 뺨 -->
                            <circle cx="60" cy="85" r="8" fill="#ffb6c1" opacity="0.6"/>
                            <circle cx="140" cy="85" r="8" fill="#ffb6c1" opacity="0.6"/>
                            
                            <!-- 머리카락 -->
                            <path d="M 50 50 Q 60 30 100 25 Q 140 30 150 50" fill="#8B4513"/>
                            <path d="M 55 40 Q 65 35 75 38" stroke="#8B4513" stroke-width="2" fill="none"/>
                            <path d="M 125 38 Q 135 35 145 40" stroke="#8B4513" stroke-width="2" fill="none"/>
                            
                            <!-- 목 -->
                            <rect x="90" y="125" width="20" height="20" fill="#f4a460"/>
                            
                            <!-- 몸 -->
                            <rect x="60" y="145" width="80" height="70" rx="10" fill="#ff69b4"/>
                            
                            <!-- 팔 -->
                            <rect x="25" y="155" width="35" height="15" rx="7" fill="#f4a460" transform="rotate(-20 57.5 162.5)"/>
                            <rect x="140" y="155" width="35" height="15" rx="7" fill="#f4a460" transform="rotate(20 157.5 162.5)"/>
                            
                            <!-- 손 -->
                            <circle cx="30" cy="175" r="8" fill="#f4a460"/>
                            <circle cx="170" cy="175" r="8" fill="#f4a460"/>
                        </svg>
                    </div>
                    <h1>크리스탈 킴</h1>
                    <p class="title">바이브 코딩 루키</p>
                    <p class="subtitle">왕초보 바이브코딩 도전</p>
                </div>
                
                <!-- 뒷면 -->
                <div class="card-back">
                    <h2>Contact</h2>
                    <div class="contact-item">
                        <span class="icon">✉️</span>
                        <span class="text">hedval369@hotmail.com</span>
                    </div>
                    <div class="contact-item">
                        <span class="icon">📱</span>
                        <span class="text">010-3417-2422</span>
                    </div>
                    <div class="contact-item">
                        <span class="icon">🏢</span>
                        <span class="text">태님퍼니쳐</span>
                    </div>
                    <p class="flip-hint">클릭하여 앞면 보기</p>
                </div>
            </div>
        </div>
        
        <p class="instruction">💡 명함을 클릭하면 뒤집어집니다</p>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
